<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Password</title>

<style>
body{
    font-family:Arial;
    background:#4facfe;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
<h2>Masukkan Password</h2>

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="cekPassword()">Masuk</button>

<p id="pesan"></p>

</div>

<script>
function cekPassword(){

    let password = document.getElementById("password").value;

    if(password == "220326"){
        window.location.href = "game1.html";
    }else{
        document.getElementById("pesan").innerHTML = "❌ Password salah!";
    }

}
</script>

</body>
</html>
